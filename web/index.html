<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- CRITICAL: viewport tag for proper mobile scaling and performance -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Rooted - Your Spiritual Growth Companion. Deepen your faith with daily verses, prayer tracking, and spiritual growth goals.">
  <meta name="theme-color" content="#3B7A57">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rooted">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Rooted - Spiritual Growth Companion</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    Increase the service worker timeout from Flutter's default 4000ms to
    20000ms. The default was too short when SupabaseService.initialize()
    takes time to resolve on first web load.
    This script must run BEFORE flutter_bootstrap.js is executed.
  -->
  <script>
    window._flutter_service_worker_timeout = 20000;
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
