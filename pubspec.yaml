name: sanctuaryflow
description: "Create a spiritual growth SPA using React, TypeScript, Vite, and Supabase with: 1) Bible reading tracker with progress metrics, 2) Prayer time notifications, 3) Message listening scheduler, 4) Christian book reading tracker, 5) Customizable spiritual goals profile, and 6) Daily verse widget. Start with the dashboard layout showing all 6 features as cards. Style with Tailwind CSS using a serene color palette (blues/whites/soft greens) and Daisy UI components for modals."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/verses.json
